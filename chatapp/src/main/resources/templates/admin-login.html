<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login - Chat App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1f2937, #111827);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 380px;
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 10px;
            color: #1f2937;
        }

        .login-container p {
            margin-bottom: 25px;
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .form-group input:focus {
            border-color: #ef4444;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .login-btn:hover {
            background-color: #dc2626;
        }

        .error-message {
            color: #dc2626;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .footer-text {
            margin-top: 18px;
            font-size: 13px;
            color: #777;
        }

        .footer-text a {
            color: #ef4444;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Access</h2>
    <p>Restricted area for administrators</p>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form action="/adminLogin" method="post">
        <div class="form-group">
            <label>Admin Username</label>
            <input type="text" name="username" placeholder="Enter admin username" required>
        </div>

        <div class="form-group">
            <label>Admin Password</label>
            <input type="password" name="password" placeholder="Enter admin password" required>
        </div>

        <button type="submit" class="login-btn">Secure Login</button>
    </form>

    <div class="footer-text">
        <br>
        <a href="/login">← Back to Standard Login</a>
    </div>
</div>

</body>
</html>
